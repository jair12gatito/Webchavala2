<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Panaderia Chavala</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/ic_icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/pages/login/style_login.css?v=20260625-3">
</head>
<body>
    <main class="auth-shell">
        <a class="auth-home-link" href="/index.html">Volver al inicio</a>

        <section class="login-page">
            <div class="login-visual" aria-label="Panaderia Chavala">
                <img src="/assets/img/lg_fondo.webp" alt="Equipo de Chavala en la pasteleria">
            </div>

            <div class="login-panel" aria-labelledby="login-title">
                <div class="login-panel__content">
                    <a class="login-brand" href="/index.html" aria-label="Volver al inicio">
                        <span>Chavala</span>
                        <small>Panader&iacute;a & Pasteler&iacute;a</small>
                    </a>

                    <div class="login-copy">
                        <h1 id="login-title">Bienvenido de nuevo</h1>
                        <p>Por favor, ingresa tus credenciales para continuar.</p>
                    </div>

                    <form class="login-form" data-login-form aria-label="Formulario de inicio de sesion">
                        <label for="login-email">Correo Electr&oacute;nico</label>
                        <input id="login-email" type="email" name="email" autocomplete="email" required>

                        <label for="login-password">Contrase&ntilde;a</label>
                        <div class="password-field">
                            <input id="login-password" type="password" name="password" autocomplete="current-password" required>
                            <button class="password-toggle" type="button" data-toggle-password aria-label="Mostrar contrasena">
                                <svg class="password-toggle__eye" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg class="password-toggle__eye-off" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M3 3l18 18"></path>
                                    <path d="M10.7 5.2A10.7 10.7 0 0 1 12 5c6 0 9.5 7 9.5 7a16.7 16.7 0 0 1-3.1 4"></path>
                                    <path d="M6.6 6.6A16.1 16.1 0 0 0 2.5 12s3.5 7 9.5 7a9.7 9.7 0 0 0 4.5-1.1"></path>
                                    <path d="M9.9 9.9A3 3 0 0 0 14.1 14"></path>
                                </svg>
                            </button>
                        </div>

                        <div class="login-options">
                            <label class="login-remember" for="login-remember">
                                <input id="login-remember" type="checkbox" name="remember">
                                <span>Recordarme</span>
                            </label>
                            <button class="login-link" type="button">&iquest;Olvidaste tu contrase&ntilde;a?</button>
                        </div>

                        <p class="login-status" data-login-status aria-live="polite"></p>

                        <button class="login-submit" type="submit">Iniciar Sesi&oacute;n</button>
                    </form>

                    <div class="login-register">
                        <span>&iquest;No tienes cuenta?</span>
                        <a class="login-link" href="/assets/pages/login/register.html">Reg&iacute;strate</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="/assets/pages/login/login.js?v=20260625-1" defer></script>
</body>
</html>
